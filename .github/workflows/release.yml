name: Build and Release

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  test:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        
    - name: Setup Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        rustflags: ""
        
    - name: Install Frontend Dependencies
      working-directory: ./app
      run: npm install
      
    - name: Format
      run: cargo fmt --all -- --check
      
    - name: Clippy
      run: cargo clippy --workspace -- -D warnings
      
    - name: Test Core
      run: cargo test -p tandem-core

  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        
    - name: Setup Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        rustflags: ""
        
    - name: Install Frontend Dependencies
      working-directory: ./app
      run: npm install
      
    - name: Build and Create Release
      uses: tauri-apps/tauri-action@v0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tagName: tandem-vpn-${{ github.ref_name }}
        releaseName: "tandem-vpn ${{ github.ref_name }}"
        releaseBody: |
          Новая версия tandem-vpn! 
          Смотрите README для инструкций по установке.
        releaseDraft: false
        prerelease: false
        projectPath: ./app
